name: Format Prek

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

env:
  VERSION: v0.3.10
  ARCH: x86_64-unknown-linux-gnu

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache prek
        id: cache-prek
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/prek
          key: prek-${{ env.VERSION }}-linux-x86_64

      - name: Install prek
        if: steps.cache-prek.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/j178/prek/releases/download/${VERSION}/prek-${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin --strip-components=1 "prek-${ARCH}/prek"

      - name: Run prek
        run: prek run --all-files --show-diff-on-failure
